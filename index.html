<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pipeline Manager PRO</title>
 
<style>
body{font-family:Inter,Arial;background:#f5f5f5;margin:0}
.header{background:#111827;color:white;padding:14px 20px;font-weight:600}
.tabs{display:flex;background:#1f2937}
.tab{padding:10px 16px;color:#9ca3af;cursor:pointer}
.tab.active{color:white;border-bottom:2px solid #ef4444}
.container{padding:20px}
.card{background:white;border-radius:10px;padding:16px;margin-bottom:20px}
table{width:100%;border-collapse:collapse}
th,td{padding:10px;border-bottom:1px solid #eee;text-align:left}
select{padding:5px;border-radius:6px}
</style>
</head>

<body>

<div class="header">Orbidi Pipeline Manager PRO</div>

<div class="tabs" id="tabs"></div>

<div class="container">
  <div class="card">
    <input id="search" placeholder="Buscar proyecto..." style="padding:6px;width:200px;margin-bottom:10px"/>
    <table>
      <thead>
        <tr>
          <th>Proyecto</th>
          <th>CS</th>
          <th>Fecha</th>
        </tr>
      </thead>
      <tbody id="table"></tbody>
    </table>
  </div>
</div>

<script>

const CS = [
"Alejandra Soto","Andrea Giraldo","Andrés Felipe Benjumea",
"Bruno Ruzic","Caroll Tinjaca","Elena Chico"
];

const STAGES = ["FDK1","FDK2","FDK3","Entrega","Seguimiento"];

let state = {
  tab:0,
  deals:[],
  filtered:[]
};

function init(){
  buildTabs();
  loadDeals();
  document.getElementById('search').addEventListener('input',filter);
}

function buildTabs(){
  const el = document.getElementById('tabs');
  el.innerHTML = STAGES.map((t,i)=>`
    <div class="tab ${i===state.tab?'active':''}" onclick="changeTab(${i})">${t}</div>
  `).join('');
}

function changeTab(i){
  state.tab = i;
  buildTabs();
  loadDeals();
}

async function loadDeals(){
  try{
    const res = await fetch('/api/hubspot');
    const data = await res.json();

    state.deals = data.results || [];
    state.filtered = state.deals;

    render();
  }catch(e){
    console.error(e);
    document.getElementById('table').innerHTML = `<tr><td colspan="3">Error cargando datos</td></tr>`;
  }
}

function filter(e){
  const val = e.target.value.toLowerCase();
  state.filtered = state.deals.filter(d =>
    (d.name || '').toLowerCase().includes(val)
  );
  render();
}

function render(){
  const el = document.getElementById('table');

  if(!state.filtered.length){
    el.innerHTML = `<tr><td colspan="3">Sin datos</td></tr>`;
    return;
  }

  el.innerHTML = state.filtered.map(d=>`
    <tr>
      <td>${d.name || 'Sin nombre'}</td>
      <td>
        <select onchange="assign('${d.id}',this.value)">
          <option value="">Sin asignar</option>
          ${CS.map(c=>`<option value="${c}">${c}</option>`).join('')}
        </select>
      </td>
      <td>${d.date || '-'}</td>
    </tr>
  `).join('');
}

async function assign(id, cs){
  try{
    await fetch('/api/hubspot',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({id,cs})
    });
    console.log('saved');
  }catch(e){
    console.error(e);
  }
}

init();

</script>

</body>
</html>
