<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Orbidi CS — Control de Carga Real</title>
<style>
:root { --primary: #1a1a2e; --accent: #e63946; --bg: #f0ede6; --ok: #1d9e75; --err: #e63946; }
*{box-sizing:border-box; margin:0; padding:0; font-family:'Inter', sans-serif;}
body{background: var(--bg); display: flex; flex-direction: column; height: 100vh; overflow: hidden;}

/* Header con Doble Status */
.header{background: var(--primary); padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; color: white;}
.logo{background: var(--accent); padding: 4px 8px; border-radius: 4px; font-weight: 800; font-size: 12px; letter-spacing: 1px;}
.status-container { display: flex; gap: 20px; }
.status-item { display: flex; align-items: center; gap: 8px; font-size: 11px; color: rgba(255,255,255,0.7); background: rgba(255,255,255,0.05); padding: 4px 10px; border-radius: 20px; }
.dot { width: 8px; height: 8px; border-radius: 50%; background: #555; }
.dot.active { background: var(--ok); box-shadow: 0 0 8px var(--ok); }
.dot.error { background: var(--err); box-shadow: 0 0 8px var(--err); }

/* Layout */
.main-container { display: flex; flex: 1; overflow: hidden; }
.sidebar { width: 240px; background: white; border-right: 1px solid #ddd; padding: 20px; display: flex; flex-direction: column; }
.sidebar h3 { font-size: 11px; text-transform: uppercase; color: #aaa; margin-bottom: 15px; letter-spacing: 1px; }
.cs-list { flex: 1; overflow-y: auto; }
.cs-card { 
    background: #f8f9fa; border: 1px solid #e0e0e0; padding: 10px 14px; border-radius: 8px; 
    font-size: 13px; cursor: grab; margin-bottom: 8px; transition: all 0.2s;
    display: flex; align-items: center; font-weight: 500; color: var(--primary);
}
.cs-card:hover { border-color: var(--accent); transform: translateX(5px); background: white; }

/* Grid de Stages */
.content { flex: 1; padding: 20px; display: grid; grid-template-columns: repeat(5, 1fr); gap: 15px; overflow-x: auto; }
.stage-column { background: #eaeaef; border-radius: 12px; display: flex; flex-direction: column; min-width: 210px; border: 2px solid transparent; transition: 0.3s; }
.stage-column.drag-over { border: 2px dashed var(--accent); background: #fde8ea; }

.stage-header { padding: 18px; background: white; border-radius: 12px 12px 0 0; text-align: center; border-bottom: 2px solid var(--bg); }
.stage-name { font-weight: 700; font-size: 13px; color: #555; margin-bottom: 8px; text-transform: uppercase; }
.project-count { font-size: 32px; font-weight: 800; color: var(--primary); line-height: 1; }
.project-label { font-size: 10px; color: #aaa; margin-top: 5px; }

.assignment-zone { flex: 1; padding: 12px; display: flex; flex-direction: column; gap: 8px; }
.assigned-cs { 
    background: var(--primary); color: white; padding: 10px 12px; border-radius: 8px; 
    font-size: 12px; display: flex; justify-content: space-between; align-items: center;
    animation: fadeIn 0.3s ease;
}
@keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
.remove-btn { cursor: pointer; font-size: 18px; line-height: 1; opacity: 0.7; }
.remove-btn:hover { color: var(--accent); opacity: 1; }

.toast { position: fixed; bottom: 20px; right: 20px; background: #333; color: white; padding: 12px 20px; border-radius: 8px; font-size: 12px; opacity: 0; transition: 0.3s; z-index: 1000; }
.toast.show { opacity: 1; }
</style>
</head>
<body>

<div class="header">
    <div style="display:flex; align-items:center; gap:15px;">
        <span class="logo">ORBIDI</span>
        <span style="font-size:14px; font-weight:500; opacity:0.9;">Control de Carga CS España</span>
    </div>
    <div class="status-container">
        <div class="status-item">
            <div class="dot" id="dot-hs"></div>
            <span>HUBSPOT</span>
        </div>
        <div class="status-item">
            <div class="dot" id="dot-db"></div>
            <span>BBDD VERCEL</span>
        </div>
    </div>
</div>

<div class="main-container">
    <div class="sidebar">
        <h3>Equipo Disponible</h3>
        <div class="cs-list" id="cs-list"></div>
        <p style="font-size: 10px; color: #bbb; margin-top: 20px; line-height: 1.4;">
            Mueve a los CS a las columnas para asignar carga de trabajo.
        </p>
    </div>

    <div class="content" id="stages-container"></div>
</div>

<div class="toast" id="toast"></div>

<script>
const CS_TEAM = ["Bruno Ruzic","Elena Chico","José Luis","María Requena",];

// Necesitas los IDs internos reales de tus etapas en HubSpot para que el conteo funcione
const STAGES = [
    {id: 'fdk1', label: 'FDK 1', hs_id: '593899722'}, 
    {id: 'fdk2', label: 'FDK 2', hs_id: '593899724'},
    {id: 'fdk3', label: 'FDK 3', hs_id: '593899726'},
    {id: 'entrega', label: 'Entrega', hs_id: '593899728'},
    {id: 'seguimiento', label: 'Seguimiento', hs_id: '593899729'}
];

let state = { assignments: {}, counts: {} };

function showToast(m){ const t=document.getElementById('toast'); t.textContent=m; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2500); }

function initUI() {
    const csList = document.getElementById('cs-list');
    CS_TEAM.sort().forEach(name => {
        const div = document.createElement('div');
        div.className = 'cs-card';
        div.draggable = true;
        div.textContent = name;
        div.ondragstart = (e) => e.dataTransfer.setData('text/plain', name);
        csList.appendChild(div);
    });

    const container = document.getElementById('stages-container');
    STAGES.forEach(s => {
        const col = document.createElement('div');
        col.className = 'stage-column';
        col.id = `col-${s.id}`;
        col.innerHTML = `
            <div class="stage-header">
                <div class="stage-name">${s.label}</div>
                <div class="project-count" id="count-${s.id}">0</div>
                <div class="project-label">Proyectos Reales</div>
            </div>
            <div class="assignment-zone" id="zone-${s.id}"></div>
        `;
        col.ondragover = (e) => { e.preventDefault(); col.classList.add('drag-over'); };
        col.ondragleave = () => col.classList.remove('drag-over');
        col.ondrop = (e) => {
            e.preventDefault();
            col.classList.remove('drag-over');
            const name = e.dataTransfer.getData('text/plain');
            assignCS(s.id, name);
        };
        container.appendChild(col);
    });
}

async function assignCS(stageId, name) {
    if (!state.assignments[stageId]) state.assignments[stageId] = [];
    if (state.assignments[stageId].includes(name)) return;
    state.assignments[stageId].push(name);
    renderAssignments();
    saveToDB(stageId);
}

async function removeCS(stageId, name) {
    state.assignments[stageId] = state.assignments[stageId].filter(n => n !== name);
    renderAssignments();
    saveToDB(stageId);
}

function renderAssignments() {
    STAGES.forEach(s => {
        const zone = document.getElementById(`zone-${s.id}`);
        zone.innerHTML = '';
        (state.assignments[s.id] || []).forEach(name => {
            const div = document.createElement('div');
            div.className = 'assigned-cs';
            div.innerHTML = `<span>${name}</span><span class="remove-btn" onclick="removeCS('${s.id}', '${name}')">×</span>`;
            zone.appendChild(div);
        });
    });
}

async function saveToDB(stageId) {
    try {
        const res = await fetch('/api/hubspot', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ action: 'saveStageAssignment', stageId: stageId, members: state.assignments[stageId] })
        });
        if(res.ok) {
            document.getElementById('dot-db').className = 'dot active';
            showToast("Guardado en BBDD Vercel");
        }
    } catch (e) { 
        document.getElementById('dot-db').className = 'dot error';
    }
}

async function syncData() {
    // 1. Cargar Asignaciones de la BBDD (Vercel/Redis)
    try {
        const redisRes = await fetch('/api/hubspot?action=loadAllAssignments');
        if (redisRes.ok) {
            state.assignments = await redisRes.json();
            renderAssignments();
            document.getElementById('dot-db').className = 'dot active';
        } else { throw new Error(); }
    } catch (e) { document.getElementById('dot-db').className = 'dot error'; }

    // 2. Cargar Conteos Reales de HubSpot
    STAGES.forEach(async (s) => {
        try {
            const body = {
                filterGroups: [{ filters: [{ propertyName: 'hs_pipeline_stage', operator: 'EQ', value: s.hs_id }] }],
                limit: 1
            };
            const res = await fetch('/api/hubspot?path=crm/v3/objects/2-110970937/search', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(body)
            });
            if (res.ok) {
                const data = await res.json();
                document.getElementById(`count-${s.id}`).textContent = data.total || 0;
                document.getElementById('dot-hs').className = 'dot active';
            } else { throw new Error(); }
        } catch (e) { document.getElementById('dot-hs').className = 'dot error'; }
    });
}

initUI();
syncData();
</script>
</body>
</html>
