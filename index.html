<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Orbidi CS — Distribución de Carga</title>
<style>
:root { --primary: #1a1a2e; --accent: #e63946; --bg: #f0ede6; }
*{box-sizing:border-box; margin:0; padding:0; font-family:'Inter', sans-serif;}
body{background: var(--bg); display: flex; flex-direction: column; height: 100vh; overflow: hidden;}

/* Header */
.header{background: var(--primary); padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; color: white;}
.logo{background: var(--accent); padding: 4px 8px; border-radius: 4px; font-weight: 800; font-size: 12px;}
.conn-status{font-size: 11px; opacity: 0.6; display: flex; align-items: center; gap: 6px;}
.dot{width: 8px; height: 8px; border-radius: 50%; background: #888;}
.dot.ok{background: #1d9e75;}

/* Main Layout */
.main-container { display: flex; flex: 1; overflow: hidden; }

/* Sidebar: Lista de CS */
.sidebar { width: 220px; background: white; border-right: 1px solid #ddd; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
.sidebar h3 { font-size: 12px; text-transform: uppercase; color: #888; margin-bottom: 10px; }
.cs-card { 
    background: #f8f9fa; border: 1px solid #e0e0e0; padding: 10px; border-radius: 6px; 
    font-size: 13px; cursor: grab; transition: transform 0.2s, box-shadow 0.2s;
    display: flex; align-items: center; gap: 8px;
}
.cs-card:active { cursor: grabbing; }
.cs-card:hover { border-color: var(--accent); background: white; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }

/* Content: Stages */
.content { flex: 1; padding: 20px; display: grid; grid-template-columns: repeat(5, 1fr); gap: 15px; overflow-x: auto; }

.stage-column { background: #eaeaef; border-radius: 10px; display: flex; flex-direction: column; min-width: 200px; border: 2px dashed transparent; transition: all 0.3s; }
.stage-column.drag-over { border-color: var(--accent); background: #fde8ea; }

.stage-header { padding: 15px; background: white; border-radius: 10px 10px 0 0; border-bottom: 2px solid var(--bg); text-align: center; }
.stage-name { font-weight: 700; font-size: 14px; color: var(--primary); margin-bottom: 5px; }
.project-count { font-size: 24px; font-weight: 800; color: var(--accent); }
.project-label { font-size: 10px; color: #aaa; text-transform: uppercase; }

/* Area de CS Asignados */
.assignment-zone { flex: 1; padding: 10px; display: flex; flex-direction: column; gap: 8px; overflow-y: auto; }
.assigned-cs { 
    background: var(--primary); color: white; padding: 8px; border-radius: 6px; 
    font-size: 12px; display: flex; justify-content: space-between; align-items: center; 
}
.remove-btn { cursor: pointer; opacity: 0.6; font-size: 14px; }
.remove-btn:hover { opacity: 1; color: var(--accent); }

.toast { position: fixed; bottom: 20px; right: 20px; background: var(--primary); color: white; padding: 10px 20px; border-radius: 8px; font-size: 12px; opacity: 0; transition: 0.3s; pointer-events: none; }
.toast.show { opacity: 1; }
</style>
</head>
<body>

<div class="header">
    <div><span class="logo">ORBIDI</span> <span style="margin-left:10px; font-size:14px;">Panel de Distribución CS</span></div>
    <div class="conn-status">
        <div class="dot" id="conn-dot"></div>
        <span id="conn-text">Sincronizando...</span>
    </div>
</div>

<div class="main-container">
    <div class="sidebar">
        <h3>Equipo CS España</h3>
        <div id="cs-list"></div>
        <p style="font-size: 10px; color: #aaa; margin-top: 20px;">ℹ️ Arrastra un nombre a una columna para asignarlo.</p>
    </div>

    <div class="content" id="stages-container">
        </div>
</div>

<div class="toast" id="toast"></div>

<script>
const CS_TEAM = ["Alejandra Soto","Andrea Giraldo","Andrés Felipe","Bruno Ruzic","Caroll Tinjaca","Elena Chico","Fredy Bustamante","Isaac Nauzeth","José Luis","María Johanna","María Requena","Nataly Molina","Tatiana Ortiz"];

const STAGES = [
    {id: 'fdk1', label: 'FDK 1', hs_id: ''},
    {id: 'fdk2', label: 'FDK 2', hs_id: ''},
    {id: 'fdk3', label: 'FDK 3', hs_id: ''},
    {id: 'entrega', label: 'Entrega', hs_id: ''},
    {id: 'seguimiento', label: 'Seguimiento', hs_id: ''}
];

let state = { assignments: {} };

function showToast(m){ const t=document.getElementById('toast'); t.textContent=m; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2000); }

// 1. Inicializar UI
function initUI() {
    const csList = document.getElementById('cs-list');
    CS_TEAM.forEach(name => {
        const div = document.createElement('div');
        div.className = 'cs-card';
        div.draggable = true;
        div.textContent = name;
        div.onselectstart = () => false;
        div.ondragstart = (e) => e.dataTransfer.setData('text/plain', name);
        csList.appendChild(div);
    });

    const container = document.getElementById('stages-container');
    STAGES.forEach(s => {
        const col = document.createElement('div');
        col.className = 'stage-column';
        col.id = `col-${s.id}`;
        col.innerHTML = `
            <div class="stage-header">
                <div class="stage-name">${s.label}</div>
                <div class="project-count" id="count-${s.id}">0</div>
                <div class="project-label">Proyectos</div>
            </div>
            <div class="assignment-zone" id="zone-${s.id}"></div>
        `;

        // Eventos Drag & Drop
        col.ondragover = (e) => { e.preventDefault(); col.classList.add('drag-over'); };
        col.ondragleave = () => col.classList.remove('drag-over');
        col.ondrop = (e) => {
            e.preventDefault();
            col.classList.remove('drag-over');
            const name = e.dataTransfer.getData('text/plain');
            assignCS(s.id, name);
        };
        container.appendChild(col);
    });
}

// 2. Lógica de Asignación y Base de Datos
async function assignCS(stageId, name) {
    if (!state.assignments[stageId]) state.assignments[stageId] = [];
    if (state.assignments[stageId].includes(name)) return;

    state.assignments[stageId].push(name);
    renderAssignments();
    saveToDB(stageId);
}

async function removeCS(stageId, name) {
    state.assignments[stageId] = state.assignments[stageId].filter(n => n !== name);
    renderAssignments();
    saveToDB(stageId);
}

function renderAssignments() {
    STAGES.forEach(s => {
        const zone = document.getElementById(`zone-${s.id}`);
        zone.innerHTML = '';
        (state.assignments[s.id] || []).forEach(name => {
            const div = document.createElement('div');
            div.className = 'assigned-cs';
            div.innerHTML = `<span>${name}</span><span class="remove-btn" onclick="removeCS('${s.id}', '${name}')">×</span>`;
            zone.appendChild(div);
        });
    });
}

async function saveToDB(stageId) {
    try {
        await fetch('/api/hubspot', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
                action: 'saveStageAssignment', // Ajustado para el nuevo backend
                stageId: stageId,
                members: state.assignments[stageId]
            })
        });
        showToast("Cambio guardado para el equipo");
    } catch (e) { showToast("Error al guardar"); }
}

// 3. Cargar Datos de HubSpot y Redis
async function loadData() {
    try {
        // Pedir a nuestra API que traiga los conteos y las asignaciones de Redis
        const res = await fetch('/api/hubspot?path=crm/v3/pipelines/2-110970937');
        const data = await res.json();
        
        // Mapear IDs de stages y cargar conteos (Simulado para este ejemplo, usa tu lógica de search)
        // Aquí deberías hacer un fetch por cada stage para sacar el total.
        STAGES.forEach(async (s, i) => {
             // Simulación de carga de conteos. En producción aquí va el fetch de totales.
             document.getElementById(`count-${s.id}`).textContent = Math.floor(Math.random() * 50) + 10;
        });

        // Cargar asignaciones de la BBDD (Redis)
        const redisRes = await fetch('/api/hubspot?action=loadAllAssignments');
        const assignments = await redisRes.json();
        state.assignments = assignments || {};
        renderAssignments();

        document.getElementById('conn-dot').className = 'dot ok';
        document.getElementById('conn-text').textContent = 'Conectado y Sincronizado';
    } catch (e) {
        document.getElementById('conn-text').textContent = 'Error de conexión';
    }
}

initUI();
loadData();
</script>
</body>
</html>
