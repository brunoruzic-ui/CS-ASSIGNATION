<script>
const CS_SPAIN = ["Alejandra Soto","Andrea Giraldo","Andrés Felipe Benjumea","Bruno Ruzic","Caroll Tinjaca","Elena Chico","Fredy Bustamante","Isaac Nauzeth","José Luis","María Johanna","María Requena","Nataly Molina","Tatiana Ortiz"];

const STAGES_CONFIG = [
  {key:'fdk1', label:'FDK1', color:'#e63946', tagClass:'tag-fdk1', desc:'Gestionado por equipo Colombia — solo lectura', readOnly:true},
  {key:'fdk2', label:'FDK2', color:'#2a7de1', tagClass:'tag-fdk2', desc:'Contactar clientes — 1.294 proyectos'},
  {key:'fdk3', label:'FDK3', color:'#1d9e75', tagClass:'tag-fdk3', desc:'Contactar clientes — 341 proyectos'},
  {key:'entrega', label:'Entrega', color:'#e67e22', tagClass:'tag-entrega', desc:'Revisar entrega y pasar a Seguimiento — 264 proyectos'},
  {key:'seguimiento', label:'Seguimiento', color:'#534AB7', tagClass:'tag-seguimiento', desc:'Verificar conformes — 837 proyectos', hasConforme:true},
];

let state = {
  token: 'TOKEN_BORRADO_POR_SEGURIDAD', // Se usará el del servidor
  connected: false,
  pipelineId: null,
  stageIds: {},
  deals: {fdk1:[],fdk2:[],fdk3:[],entrega:[],seguimiento:[]},
  counts: {fdk1:0,fdk2:0,fdk3:0,entrega:0,seguimiento:0},
  assignments: {},
  pages: {fdk1:1,fdk2:1,fdk3:1,entrega:1,seguimiento:1},
  search: {fdk1:'',fdk2:'',fdk3:'',entrega:'',seguimiento:''},
  filterOwner: {fdk1:'',fdk2:'',fdk3:'',entrega:'',seguimiento:''},
  activeTab: 0,
};
const PAGE_SIZE = 20;

function initials(name){return name.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();}
function load(k){try{return JSON.parse(localStorage.getItem(k)||'null');}catch(e){return null;}}
function save(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch(e){}}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);}

// ... (Funciones buildViews y buildCsGrids se mantienen igual) ...
function buildViews(){
  const container=document.getElementById('stage-views');
  container.innerHTML='';
  STAGES_CONFIG.forEach((st,i)=>{
    const div=document.createElement('div');
    div.className='stage-view'+(i===0?' active':'');
    div.id='view-'+i;
    div.innerHTML=`
      <div class="stage-top">
        <div class="stage-info">
          <h2>${st.label}</h2>
          <p>${st.desc}</p>
        </div>
        <div class="stage-stats">
          <div class="stat-card"><div class="stat-num" id="scount-${i}">—</div><div class="stat-label">Total</div></div>
          <div class="stat-card"><div class="stat-num" id="sassigned-${i}">—</div><div class="stat-label">Asignados</div></div>
          ${st.hasConforme?`<div class="stat-card"><div class="stat-num" id="sconforme-${i}" style="color:#1d9e75">—</div><div class="stat-label">Conformes</div></div>`:''}
        </div>
      </div>
      ${!st.readOnly?`
      <div class="assign-section">
        <div class="assign-header">
          <span class="assign-header-title">Asignación de CS</span>
        </div>
        <div class="cs-grid" id="cs-grid-${i}"></div>
      </div>`:'<div style="background:#fde8ea;border-radius:8px;padding:10px 14px;font-size:12px;color:#8c1c22;margin-bottom:14px;">Este stage está gestionado por el equipo de Colombia. Solo lectura.</div>'}
      <div class="deals-section">
        <div class="deals-header">
          <div class="deals-header-left">
            <span class="deals-title">Proyectos</span>
            <input class="search-input" placeholder="Buscar proyecto..." oninput="onSearch(${i},this.value)" id="search-${i}"/>
            <select class="filter-select" onchange="onFilterOwner(${i},this.value)" id="fowner-${i}">
              <option value="">Todos los CS</option>
              ${CS_SPAIN.map(n=>`<option value="${n}">${n}</option>`).join('')}
            </select>
          </div>
          <button class="btn-refresh" onclick="loadDeals(${i})">Actualizar</button>
        </div>
        <table class="deals-table">
          <thead><tr>
            <th style="width:28%">Nombre</th>
            <th style="width:18%">Propietario</th>
            ${st.hasConforme?'<th style="width:12%">Conforme</th>':''}
            <th style="width:14%">Fecha creación</th>
            <th style="width:10%">Ver</th>
          </tr></thead>
          <tbody id="tbody-${i}"><tr class="loading-row"><td colspan="5">Conecta HubSpot para ver los proyectos</td></tr></tbody>
        </table>
        <div class="pagination" id="pagination-${i}"></div>
      </div>
    `;
    container.appendChild(div);
  });
  buildCsGrids();
}

function buildCsGrids(){
  STAGES_CONFIG.forEach((st,i)=>{
    if(st.readOnly) return;
    const grid=document.getElementById('cs-grid-'+i);
    if(!grid) return;
    grid.innerHTML='';
    CS_SPAIN.forEach(name=>{
      const key=st.key;
      const asgn=state.assignments[key]||{};
      const isAssigned=!!asgn[name];
      const quota=asgn[name]||0;
      const card=document.createElement('div');
      card.className='cs-card'+(isAssigned?' assigned':'');
      card.id=`cscard-${i}-${name.replace(/\s/g,'_')}`;
      card.innerHTML=`
        <div class="cs-left">
          <div class="cs-avatar">${initials(name)}</div>
          <div>
            <div class="cs-name">${name}</div>
            <div class="cs-quota">${isAssigned?`Cuota: <strong>${quota}</strong> proyectos`:'Sin asignar'}</div>
          </div>
        </div>
        <div class="cs-actions">
          ${isAssigned?`<input type="number" class="quota-input" value="${quota}" min="0" max="500" onchange="updateQuota('${key}','${name}',this.value)" title="Proyectos asignados"/>
          <button class="btn-toggle remove" onclick="toggleAssign('${key}','${name}',${i})">Quitar</button>`
          :`<button class="btn-toggle add" onclick="toggleAssign('${key}','${name}',${i})">Asignar</button>`}
        </div>
      `;
      grid.appendChild(card);
    });
  });
}

function toggleAssign(key,name,tabIdx){
  if(!state.assignments[key]) state.assignments[key]={};
  if(state.assignments[key][name]) delete state.assignments[key][name];
  else state.assignments[key][name]=50;
  save('orbidi_assignments',state.assignments);
  buildCsGrids();
  renderDealsTable(tabIdx);
}

function updateQuota(key,name,val){
  if(!state.assignments[key]) state.assignments[key]={};
  state.assignments[key][name]=parseInt(val)||0;
  save('orbidi_assignments',state.assignments);
  buildCsGrids();
}

function switchTab(i){
  state.activeTab=i;
  document.querySelectorAll('.tab').forEach((t,j)=>t.classList.toggle('active',j===i));
  document.querySelectorAll('.stage-view').forEach((v,j)=>v.classList.toggle('active',j===i));
  if(state.connected && state.deals[STAGES_CONFIG[i].key].length===0) loadDeals(i);
}

function onSearch(i,val){
  const key=STAGES_CONFIG[i].key;
  state.search[key]=val.toLowerCase();
  state.pages[key]=1;
  renderDealsTable(i);
}

function onFilterOwner(i,val){
  const key=STAGES_CONFIG[i].key;
  state.filterOwner[key]=val;
  state.pages[key]=1;
  renderDealsTable(i);
}

async function connectHubSpot(){
  state.connected = true; // Forzamos conexión ya que el token está en Vercel
  const btn=document.getElementById('btn-connect');
  btn.disabled=true; btn.textContent='Conectado';
  setConnected(true);
  showToast('Conectado vía Vercel Proxy');
  await discoverPipeline();
}

async function discoverPipeline(){
  try {
    // CAMBIO 1: Ruta relativa a tu API
    const res=await fetch('/api/hubspot?path=crm/v3/pipelines/2-110970937');
    const data=await res.json();
    const pipelines=data.results||[data];
    let found=pipelines[0];
    
    if(found){
      state.pipelineId=found.id;
      (found.stages||[]).forEach(s=>{
        const l=s.label.toLowerCase();
        if(l.includes('fdk1')) state.stageIds.fdk1=s.id;
        else if(l.includes('fdk2')) state.stageIds.fdk2=s.id;
        else if(l.includes('fdk3')) state.stageIds.fdk3=s.id;
        else if(l.includes('entrega')) state.stageIds.entrega=s.id;
        else if(l.includes('seguimiento')) state.stageIds.seguimiento=s.id;
      });
    }
    await loadAllCounts();
    loadDeals(state.activeTab);
  } catch(e){ showToast('Error al descubrir Pipeline'); }
}

async function loadAllCounts(){
  for(let i=0;i<STAGES_CONFIG.length;i++){
    const st=STAGES_CONFIG[i];
    try {
      const filters=buildFilters(st.key,[]);
      const body={filterGroups:[{filters}],limit:1,properties:['hs_object_id']};
      // CAMBIO 2: Ruta relativa + Search
      const res=await fetch('/api/hubspot?path=crm/v3/objects/2-110970937/search',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify(body)
      });
      const data=await res.json();
      const count=data.total||0;
      state.counts[st.key]=count;
      document.getElementById('tc-'+i).textContent=count>999?Math.round(count/1000)+'k':count;
      document.getElementById('scount-'+i).textContent=count.toLocaleString();
    } catch(e){}
  }
}

function buildFilters(stageKey,extra){
  const filters=[...extra];
  if(state.stageIds[stageKey]) filters.push({propertyName:'hs_pipeline_stage',operator:'EQ',value:state.stageIds[stageKey]});
  return filters;
}

async function loadDeals(tabIdx){
  const st=STAGES_CONFIG[tabIdx];
  const key=st.key;
  const tbody=document.getElementById('tbody-'+tabIdx);
  tbody.innerHTML=`<tr class="loading-row"><td colspan="5">Cargando proyectos...</td></tr>`;
  try {
    const filters=buildFilters(key,[]);
    if(state.filterOwner[key]) filters.push({propertyName:'hubspot_owner_id',operator:'EQ',value:state.filterOwner[key]});

    const body={
      filterGroups:[{filters}],
      limit:100,
      properties:['dealname','hubspot_owner_id','createdate','conforme__kit_digital_'],
      sorts:[{propertyName:'createdate',direction:'DESCENDING'}]
    };
    // CAMBIO 3: Ruta relativa
    const res=await fetch('/api/hubspot?path=crm/v3/objects/2-110970937/search',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify(body)
    });
    const data=await res.json();
    let deals=(data.results||[]);
    if(state.search[key]) deals=deals.filter(d=>(d.properties.dealname||'').toLowerCase().includes(state.search[key]));
    state.deals[key]=deals;
    renderDealsTable(tabIdx);
    updateStageStats(tabIdx,deals);
  } catch(e){
    tbody.innerHTML=`<tr class="empty-row"><td colspan="5">Error al cargar datos</td></tr>`;
  }
}

function renderDealsTable(tabIdx){
  const st=STAGES_CONFIG[tabIdx];
  const key=st.key;
  const deals=state.deals[key]||[];
  const page=state.pages[key]||1;
  const start=(page-1)*PAGE_SIZE, end=start+PAGE_SIZE;
  const paginated=deals.slice(start,end);
  const tbody=document.getElementById('tbody-'+tabIdx);

  if(deals.length===0){
    tbody.innerHTML=`<tr class="empty-row"><td colspan="5">No hay proyectos</td></tr>`;
    return;
  }

  tbody.innerHTML=paginated.map(deal=>{
    const name=deal.properties.dealname||'Sin nombre';
    const ownerId=deal.properties.hubspot_owner_id||'';
    const date=deal.properties.createdate?deal.properties.createdate.slice(0,10):'—';
    const isConforme=deal.properties['conforme__kit_digital_']==='true';
    return `<tr>
      <td class="deal-name">${name}</td>
      <td>
        <select class="owner-select" onchange="assignOwner('${deal.id}',this.value,${tabIdx})">
          <option value="">Sin asignar</option>
          ${CS_SPAIN.map(n=>`<option value="${n}" ${ownerId===n?'selected':''}>${n.split(' ')[0]}</option>`).join('')}
        </select>
      </td>
      ${st.hasConforme?`<td><button class="conforme-btn ${isConforme?'yes':'no'}" onclick="toggleConforme('${deal.id}',${tabIdx},${isConforme})">${isConforme?'SI':'NO'}</button></td>`:''}
      <td style="color:#888">${date}</td>
      <td><a class="hubspot-link" href="https://app-eu1.hubspot.com/contacts/25808060/record/2-110970937/${deal.id}" target="_blank">Ver ↗</a></td>
    </tr>`;
  }).join('');
}

async function assignOwner(dealId,ownerName,tabIdx){
  try {
    // CAMBIO 4: Ruta relativa
    await fetch(`/api/hubspot?path=crm/v3/objects/2-110970937/${dealId}`,{
      method:'PATCH',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({properties:{hubspot_owner_id:ownerName}})
    });
    showToast('Asignado correctamente');
  } catch(e){ showToast('Error al asignar'); }
}

async function toggleConforme(dealId,tabIdx,current){
  const newVal=current?'false':'true';
  try {
    // CAMBIO 5: Ruta relativa
    await fetch(`/api/hubspot?path=crm/v3/objects/2-110970937/${dealId}`,{
      method:'PATCH',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({properties:{'conforme__kit_digital_':newVal}})
    });
    loadDeals(tabIdx);
    showToast('Estado actualizado');
  } catch(e){ showToast('Error'); }
}

function setConnected(ok){
  document.getElementById('conn-dot').className='conn-dot '+(ok?'ok':'err');
  document.getElementById('conn-label').textContent=ok?'Conectado':'Error';
}

function init(){
  state.assignments=load('orbidi_assignments')||{};
  buildViews();
}
init();
</script>
